<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행사업총괄 25년 IN&OUT 콜 유형 분석</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:#f4f4f1;color:#1a1a18;font-size:14px;line-height:1.6}

/* ─── SIDEBAR ─── */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:#1c1c1a;color:#d0d0c8;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid #333}
.sidebar-logo h1{font-size:13px;font-weight:700;color:#fff;line-height:1.4}
.sidebar-logo p{font-size:10px;color:#888;margin-top:3px}
.nav-section{padding:12px 0 4px 18px;font-size:10px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:block;padding:7px 18px;font-size:12px;color:#aaa;cursor:pointer;border-left:2px solid transparent;transition:all .15s;text-decoration:none}
.nav-item:hover{color:#fff;background:#2a2a28}
.nav-item.active{color:#fff;background:#2a2a28;border-left-color:#4a9eff}
.nav-sub{padding-left:12px;font-size:11px;color:#777}
.nav-sub.active{color:#9bc8ff}

/* ─── MAIN ─── */
.main{flex:1;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e0e0db;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;color:#1a1a18}
.topbar-sub{font-size:11px;color:#999;margin-top:1px}
.content{padding:24px 28px 60px;max-width:1200px}

/* ─── PAGE ─── */
.page{display:none}
.page.active{display:block}
.page-title{font-size:18px;font-weight:700;margin-bottom:6px}
.page-sub{font-size:12px;color:#888;margin-bottom:20px}

/* ─── METRICS ─── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric-card{background:#fff;border:1px solid #e4e4df;border-radius:10px;padding:14px 16px;border-top:2px solid #2457a4}
.metric-card .lbl{font-size:10px;font-weight:700;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.metric-card .val{font-size:24px;font-weight:700;color:#1a1a18;line-height:1}
.metric-card .sub{font-size:10px;color:#aaa;margin-top:3px}

/* ─── CARD ─── */
.card{background:#fff;border:1px solid #e4e4df;border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-head{padding:14px 18px;border-bottom:1px solid #f0f0eb;display:flex;align-items:center;justify-content:space-between}
.card-head-title{font-size:13px;font-weight:700;color:#444}
.card-body{padding:16px 18px}

/* ─── TABS ─── */
.tabs{display:flex;border-bottom:1px solid #e4e4df;background:#fafafa;padding:0 18px}
.tab{padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#2457a4;border-bottom-color:#2457a4}
.tab:hover{color:#333}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ─── TABLE ─── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f7f7f4}
th{padding:8px 10px;text-align:left;font-weight:700;font-size:10px;color:#888;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid #e8e8e3;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #f0f0eb;vertical-align:middle;color:#333}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafaf8}

/* ─── BADGES ─── */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.b-auto{background:#ddeeff;color:#1a5fa8}
.b-tmpl{background:#d8f5e8;color:#136b3a}
.b-ops{background:#eeecea;color:#5a5a55}
.b-review{background:#fff3d8;color:#7a4f00}
.b-h{background:#ffe5e5;color:#a02020}
.b-m{background:#fff3d8;color:#7a4f00}
.b-l{background:#d8f5e8;color:#136b3a}

/* ─── BARS ─── */
.bars-wrap{padding:14px 18px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:11px;color:#666;width:100px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-tracks{flex:1;display:flex;flex-direction:column;gap:2px}
.bar-track{height:8px;background:#f0f0eb;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:10px;color:#aaa;width:70px;text-align:right;flex-shrink:0}
.bar-legend{display:flex;gap:12px;font-size:11px;color:#888;margin-bottom:10px;padding:0 18px}
.bar-legend span{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.btn:active{transform:scale(.98)}
.btn-primary{background:#2457a4;color:#fff}
.btn-primary:hover{background:#1d4890}
.btn-ghost{background:#f4f4f1;color:#555;border:1px solid #ddd}
.btn-ghost:hover{background:#e8e8e3}
.btn-danger{background:#ffe8e8;color:#b52020;border:1px solid #f5c8c8}
.btn-danger:hover{background:#fdd}
.btn-icon{width:26px;height:26px;padding:0;justify-content:center;font-size:13px;border-radius:5px}

/* ─── CHARTS ─── */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.chart-leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:10px;color:#666;justify-content:center}
.chart-leg span{display:flex;align-items:center;gap:3px}

/* ─── MODAL ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.18);width:100%;max-width:520px;overflow:hidden}
.modal-hd{padding:16px 20px;border-bottom:1px solid #e8e8e3;display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:14px;font-weight:700}
.modal-bd{padding:18px 20px;display:flex;flex-direction:column;gap:13px;max-height:60vh;overflow-y:auto}
.modal-ft{padding:12px 20px;border-top:1px solid #e8e8e3;display:flex;justify-content:flex-end;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:700;color:#666}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid #d8d8d3;border-radius:7px;font-size:12px;color:#1a1a18;background:#fff;font-family:inherit;outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#2457a4;box-shadow:0 0 0 2px rgba(36,87,164,.1)}
.fg textarea{resize:vertical;min-height:56px}

/* ─── DEL CONFIRM ─── */
.del-box{background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.16);padding:22px 24px;max-width:340px;width:90%;text-align:center}
.del-box h3{font-size:14px;font-weight:700;margin-bottom:7px}
.del-box p{font-size:12px;color:#666;margin-bottom:16px}
.del-btns{display:flex;gap:8px;justify-content:center}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a18;color:#fff;padding:9px 16px;border-radius:7px;font-size:12px;font-weight:600;z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ─── IMPROVE LIST ─── */
.imp-list{list-style:none}
.imp-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0eb;font-size:12px}
.imp-item:last-child{border-bottom:none}
.imp-icon{font-size:15px;flex-shrink:0;margin-top:1px}

/* ─── SECTION HEADER ─── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.06em;text-transform:uppercase}

@media(max-width:900px){
  .sidebar{display:none}
  .metrics{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>여행사업총괄<br>콜 유형 분석</h1>
    <p>2025년 IN&OUT 분석</p>
  </div>
  <div style="padding-bottom:20px">
    <div class="nav-section">전체 요약</div>
    <a class="nav-item active" onclick="goPage('pg-pkg-sum')">📦 PKG 전체요약</a>
    <a class="nav-item" onclick="goPage('pg-fit-sum')">✈️ FIT 전체요약</a>
    <div class="nav-section">PKG 부문별</div>
    <a class="nav-item" onclick="goPage('pg-유럽부문')">🇪🇺 유럽부문</a>
    <a class="nav-item" onclick="goPage('pg-일본부문')">🇯🇵 일본부문</a>
    <a class="nav-item" onclick="goPage('pg-동남아부문')">🌴 동남아부문</a>
    <a class="nav-item" onclick="goPage('pg-중국부문')">🇨🇳 중국부문</a>
    <a class="nav-item" onclick="goPage('pg-미주남태부문')">🌎 미주남태부문</a>
    <a class="nav-item" onclick="goPage('pg-크루즈팀')">🚢 크루즈팀</a>
    <div class="nav-section">FIT 상세</div>
    <a class="nav-item" onclick="goPage('pg-fit-detail')">🗂️ FIT 상세 목록</a>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">PKG 전체요약</div>
      <div class="topbar-sub">CS 상담 업무의 자동화 및 효율화를 위한 기초 자료</div>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

</div>

<!-- Edit Modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="editTitle">항목 추가</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-bd">
      <input type="hidden" id="eId">
      <input type="hidden" id="ePageKey">
      <input type="hidden" id="eCallType">
      <div class="fg"><label>콜 유형 *</label><input id="eType" placeholder="예: 결제 안내"></div>
      <div class="fg"><label>주요 내용 *</label><input id="eContent" placeholder="예: 예약금/잔금/재결제"></div>
      <div class="form-row">
        <div class="fg"><label>일 평균 발생빈도 (건)</label><input type="number" id="eFreq" min="1" placeholder="15"></div>
        <div class="fg"><label>소요시간 (분/건)</label><input type="number" id="eTime" min="1" placeholder="5"></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>처리 난이도</label><select id="eDiff"><option>상</option><option selected>중</option><option>하</option></select></div>
        <div class="fg"><label>자동화 검토</label>
          <select id="eAuto">
            <option>자동화 검토</option><option>가능여부 검토</option>
            <option>템플릿 대체화</option><option>운영 처리</option>
            <option>템플릿 대체</option><option>Y</option><option>N</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>상세 내용</label><textarea id="eDetail"></textarea></div>
      <div class="fg"><label>실무 의견/비고</label><textarea id="eNote"></textarea></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeEdit()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- Improve Modal -->
<div class="overlay" id="impOverlay">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="impTitle">개선방안 추가</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeImp()">✕</button>
    </div>
    <div class="modal-bd">
      <input type="hidden" id="impId">
      <input type="hidden" id="impPageKey">
      <div class="fg"><label>항목명 *</label><input id="impName"></div>
      <div class="fg"><label>내용 *</label><textarea id="impContent" style="min-height:72px"></textarea></div>
      <div class="fg"><label>아이콘 (이모지)</label><input id="impIcon" maxlength="4" placeholder="📌"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeImp()">취소</button>
      <button class="btn btn-primary" onclick="saveImp()">저장</button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="overlay" id="delOverlay">
  <div class="del-box">
    <h3>항목을 삭제할까요?</h3>
    <p id="delDesc">삭제하면 되돌릴 수 없습니다.</p>
    <div class="del-btns">
      <button class="btn btn-ghost" onclick="closeDel()">취소</button>
      <button class="btn btn-danger" onclick="confirmDel()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

function initStore(pageKey, outItems, inItems, impItems) {
  store[pageKey] = {
    out: outItems.map(x=>({...x})),
    in: inItems.map(x=>({...x})),
    imp: (impItems || []).map(x=>({...x})),
  };
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function diffBadge(d) {
  const m = {'상':'b-h','중':'b-m','하':'b-l'};
  return `<span class="badge ${m[d]||'b-m'}">${d||'중'}</span>`;
}
function autoBadge(a) {
  const m = {'자동화 검토':'b-auto','가능여부 검토':'b-review','템플릿 대체화':'b-tmpl','운영 처리':'b-ops','템플릿 대체':'b-tmpl','Y':'b-auto','N':'b-ops'};
  return `<span class="badge ${m[a]||'b-ops'}">${a||'-'}</span>`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let chartInstances = {};
function destroyCharts(prefix){
  Object.keys(chartInstances).forEach(k=>{
    if(k.startsWith(prefix)){chartInstances[k].destroy();delete chartInstances[k];}
  });
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────
function renderBars(containerId, items) {
  const sorted=[...items].sort((a,b)=>b.freq-a.freq);
  const mf=Math.max(...sorted.map(d=>d.freq),1), mt=Math.max(...sorted.map(d=>d.time),1);
  return `<div class="bar-legend">
    <span><span class="leg-dot" style="background:#2457a4"></span>발생빈도</span>
    <span><span class="leg-dot" style="background:#c4531f"></span>소요시간</span>
  </div>
  <div class="bars-wrap">${sorted.map(d=>`
    <div class="bar-row">
      <div class="bar-lbl" title="${esc(d.type)}">${esc(d.type)}</div>
      <div class="bar-tracks">
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.freq/mf*100)}%;background:#2457a4"></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.time/mt*100)}%;background:#c4531f"></div></div>
      </div>
      <div class="bar-val">${d.freq}건/${d.time}분</div>
    </div>`).join('')}
  </div>`;
}

function renderTable(pageKey, callType, items) {
  const sorted=[...items].sort((a,b)=>b.freq-a.freq);
  return `<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>콜 유형</th><th>주요 내용</th><th>일평균</th><th>소요시간</th><th>난이도</th><th>자동화 검토</th><th>관리</th></tr></thead>
    <tbody>${sorted.map((d,i)=>`
      <tr>
        <td><b style="color:#aaa">${i+1}</b></td>
        <td><b>${esc(d.type)}</b></td>
        <td style="color:#666">${esc(d.content)}</td>
        <td><b>${d.freq}건</b></td>
        <td>${d.time}분</td>
        <td>${diffBadge(d.diff)}</td>
        <td>${autoBadge(d.auto)}</td>
        <td><div style="display:flex;gap:3px">
          <button class="btn btn-ghost btn-icon" title="수정" onclick="openEdit('${pageKey}','${callType}',${d.id})">✏️</button>
          <button class="btn btn-danger btn-icon" title="삭제" onclick="openDel('${pageKey}','${callType}',${d.id},'${esc(d.type)}')">🗑️</button>
        </div></td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

  const {out, in:inArr} = store[pageKey];
  const outTop = out.reduce((a,b)=>a.freq>b.freq?a:b, out[0]||{freq:0,type:'-'});
  const inTop  = inArr.reduce((a,b)=>a.freq>b.freq?a:b, inArr[0]||{freq:0,type:'-'});
  return `<div class="metrics">
    <div class="metric-card"><div class="lbl">OUT콜 유형</div><div class="val">${out.length}</div><div class="sub">아웃바운드</div></div>
    <div class="metric-card"><div class="lbl">OUT콜 1위</div><div class="val">${outTop.freq}건/일</div><div class="sub">${esc(outTop.type||'-')}</div></div>
    <div class="metric-card"><div class="lbl">IN콜 유형</div><div class="val">${inArr.length}</div><div class="sub">인바운드</div></div>
    <div class="metric-card"><div class="lbl">IN콜 1위</div><div class="val">${inTop.freq}건/일</div><div class="sub">${esc(inTop.type||'-')}</div></div>
  </div>`;
}

function renderPieChart(canvasId, items) {
  const counts = {};
  items.forEach(d=>{ counts[d.auto]=(counts[d.auto]||0)+1; });
  const labels=Object.keys(counts), values=Object.values(counts);
  const colorMap={'자동화 검토':'#2457a4','가능여부 검토':'#c4531f','템플릿 대체화':'#1a7a4a','운영 처리':'#888','템플릿 대체':'#2a9a6a','Y':'#2457a4','N':'#888'};
  const colors=labels.map(l=>colorMap[l]||'#aaa');
  setTimeout(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas) return;
    if(chartInstances[canvasId]) chartInstances[canvasId].destroy();
    chartInstances[canvasId]=new Chart(canvas,{
      type:'doughnut',
      data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed}건`}}}}
    });
    document.getElementById(canvasId+'-leg').innerHTML=labels.map((l,i)=>
      `<span><span class="leg-dot" style="background:${colors[i]}"></span>${esc(l)} (${values[i]})</span>`).join('');
  },50);
  return `<div style="position:relative;height:160px"><canvas id="${canvasId}" role="img" aria-label="자동화 현황 차트"></canvas></div>
    <div class="chart-leg" id="${canvasId}-leg"></div>`;
}

function renderImpList(pageKey) {
  const imp = store[pageKey].imp;
  if (!imp.length) return '<p style="font-size:12px;color:#aaa;padding:12px 0">등록된 개선 방안이 없습니다.</p>';
  return `<ul class="imp-list">${imp.map(d=>`
    <li class="imp-item">
      <span class="imp-icon">${d.icon||'📌'}</span>
      <span style="flex:1"><b>${esc(d.name)}</b> — ${esc(d.content)}</span>
      <div style="display:flex;gap:3px;flex-shrink:0;margin-left:8px">
        <button class="btn btn-ghost btn-icon" onclick="openImpEdit('${pageKey}',${d.id})">✏️</button>
        <button class="btn btn-danger btn-icon" onclick="openDelImp('${pageKey}',${d.id},'${esc(d.name)}')">🗑️</button>
      </div>
    </li>`).join('')}</ul>`;
}

function renderCallSection(pageKey, hasImp) {
  const outItems = store[pageKey].out;
  const inItems  = store[pageKey].in;
  return `
    ${renderMetrics(pageKey)}
    <div class="charts-row">
      <div class="card card-body">
        <div class="card-head-title" style="font-size:12px;font-weight:700;color:#666;margin-bottom:10px">OUT콜 자동화 현황</div>
        ${renderPieChart('pie-out-'+pageKey, outItems)}
      </div>
      <div class="card card-body">
        <div class="card-head-title" style="font-size:12px;font-weight:700;color:#666;margin-bottom:10px">IN콜 자동화 현황</div>
        ${renderPieChart('pie-in-'+pageKey, inItems)}
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tab-out-${pageKey}" onclick="switchCallTab('${pageKey}','out')">📤 아웃바운드</div>
        <div class="tab" id="tab-in-${pageKey}" onclick="switchCallTab('${pageKey}','in')">📥 인바운드</div>
      </div>
      <div style="padding:10px 18px 8px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary" onclick="openAdd('${pageKey}')">＋ 항목 추가</button>
      </div>
      <div id="panel-out-${pageKey}" class="tab-panel active">
        ${renderBars('bars-out-'+pageKey, outItems)}
        ${renderTable(pageKey,'out',outItems)}
      </div>
      <div id="panel-in-${pageKey}" class="tab-panel">
        ${renderBars('bars-in-'+pageKey, inItems)}
        ${renderTable(pageKey,'in',inItems)}
      </div>
    </div>
    ${hasImp ? `
    <div class="sec-hd" style="margin-top:20px">
      <span class="sec-title">개선 방안</span>
      <button class="btn btn-ghost" onclick="openImpAdd('${pageKey}')">＋ 추가</button>
    </div>
    <div class="card card-body" id="imp-list-${pageKey}">${renderImpList(pageKey)}</div>` : ''}
  `;
}

function switchCallTab(pageKey, tab) {
  ['out','in'].forEach(t => {
    document.getElementById(`tab-${t}-${pageKey}`).classList.toggle('active', t===tab);
    document.getElementById(`panel-${t}-${pageKey}`).classList.toggle('active', t===tab);
  });
}

// ── PAGES ──────────────────────────────────────────────────────────────────
const pageConfigs = {
  'pg-pkg-sum':      { title:'PKG 전체요약',    key:'pkg-sum',     imp:true },
  'pg-fit-sum':      { title:'FIT 전체요약',    key:'fit-sum',     imp:true },
  'pg-유럽부문':     { title:'PKG 유럽부문',    key:'유럽부문',     imp:false },
  'pg-일본부문':     { title:'PKG 일본부문',    key:'일본부문',     imp:false },
  'pg-동남아부문':   { title:'PKG 동남아부문',  key:'동남아부문',   imp:false },
  'pg-중국부문':     { title:'PKG 중국부문',    key:'중국부문',     imp:false },
  'pg-미주남태부문': { title:'PKG 미주남태부문',key:'미주남태부문', imp:false },
  'pg-크루즈팀':     { title:'크루즈팀',        key:'크루즈팀',     imp:false },
  'pg-fit-detail':   { title:'FIT 상세',        key:'fit-detail',  imp:false },
};

let currentPage = 'pg-pkg-sum';

function goPage(pgId) {
  currentPage = pgId;
  const cfg = pageConfigs[pgId];
  document.getElementById('topbarTitle').textContent = cfg.title;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[onclick="goPage('${pgId}')"]`).classList.add('active');
  renderPage(pgId);
}

function renderPage(pgId) {
  const cfg = pageConfigs[pgId];
  destroyCharts('pie-out-'+cfg.key);
  destroyCharts('pie-in-'+cfg.key);
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">${cfg.title}</div>
    <div class="page-sub">CS 상담 업무 유형 분석 — 발생빈도 · 소요시간 · 처리난이도 · 자동화 검토</div>
    ${renderCallSection(cfg.key, cfg.imp)}
  `;
}

// ── EDIT MODAL ─────────────────────────────────────────────────────────────
let editTarget = null;

function openAdd(pageKey) {
  const cfg = pageConfigs[currentPage];
  const tab = document.getElementById('tab-out-'+pageKey).classList.contains('active') ? 'out' : 'in';
  editTarget = null;
  document.getElementById('editTitle').textContent = '항목 추가 — '+(tab==='out'?'아웃바운드':'인바운드');
  document.getElementById('eId').value='';
  document.getElementById('ePageKey').value=pageKey;
  document.getElementById('eCallType').value=tab;
  ['eType','eContent','eDetail','eNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('eFreq').value='';
  document.getElementById('eTime').value='';
  document.getElementById('eDiff').value='중';
  document.getElementById('eAuto').value=tab==='out'?'자동화 검토':'가능여부 검토';
  document.getElementById('editOverlay').classList.add('open');
}
function openEdit(pageKey, callType, id) {
  const arr = store[pageKey][callType];
  const item = arr.find(d=>d.id===id);
  if(!item) return;
  editTarget = {pageKey, callType, id};
  document.getElementById('editTitle').textContent='항목 수정';
  document.getElementById('eId').value=id;
  document.getElementById('ePageKey').value=pageKey;
  document.getElementById('eCallType').value=callType;
  document.getElementById('eType').value=item.type;
  document.getElementById('eContent').value=item.content;
  document.getElementById('eFreq').value=item.freq;
  document.getElementById('eTime').value=item.time;
  document.getElementById('eDiff').value=item.diff||'중';
  document.getElementById('eAuto').value=item.auto||'가능여부 검토';
  document.getElementById('eDetail').value=item.detail||'';
  document.getElementById('eNote').value=item.note||'';
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');}
function saveEdit(){
  const pageKey=document.getElementById('ePageKey').value;
  const callType=document.getElementById('eCallType').value;
  const idVal=parseInt(document.getElementById('eId').value)||0;
  const type=document.getElementById('eType').value.trim();
  const content=document.getElementById('eContent').value.trim();
  if(!type||!content){alert('콜 유형과 주요 내용은 필수입니다.');return;}
  const item={type,content,freq:parseInt(document.getElementById('eFreq').value)||1,
    time:parseInt(document.getElementById('eTime').value)||1,
    diff:document.getElementById('eDiff').value,auto:document.getElementById('eAuto').value,
    detail:document.getElementById('eDetail').value,note:document.getElementById('eNote').value};
  if(idVal){
    const idx=store[pageKey][callType].findIndex(d=>d.id===idVal);
    if(idx>-1) store[pageKey][callType][idx]={...store[pageKey][callType][idx],...item};
    toast('수정되었습니다.');
  } else {
    store[pageKey][callType].push({id:nextId++,...item});
    toast('추가되었습니다.');
  }
  closeEdit(); renderPage(currentPage);
}

// ── IMPROVE MODAL ──────────────────────────────────────────────────────────
function openImpAdd(pageKey){
  document.getElementById('impTitle').textContent='개선방안 추가';
  document.getElementById('impId').value='';
  document.getElementById('impPageKey').value=pageKey;
  ['impName','impContent','impIcon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('impOverlay').classList.add('open');
}
function openImpEdit(pageKey,id){
  const item=store[pageKey].imp.find(d=>d.id===id);
  if(!item) return;
  document.getElementById('impTitle').textContent='개선방안 수정';
  document.getElementById('impId').value=id;
  document.getElementById('impPageKey').value=pageKey;
  document.getElementById('impName').value=item.name;
  document.getElementById('impContent').value=item.content;
  document.getElementById('impIcon').value=item.icon||'';
  document.getElementById('impOverlay').classList.add('open');
}
function closeImp(){document.getElementById('impOverlay').classList.remove('open');}
function saveImp(){
  const pageKey=document.getElementById('impPageKey').value;
  const idVal=parseInt(document.getElementById('impId').value)||0;
  const name=document.getElementById('impName').value.trim();
  const content=document.getElementById('impContent').value.trim();
  const icon=document.getElementById('impIcon').value.trim()||'📌';
  if(!name||!content){alert('항목명과 내용은 필수입니다.');return;}
  if(idVal){
    const idx=store[pageKey].imp.findIndex(d=>d.id===idVal);
    if(idx>-1) store[pageKey].imp[idx]={...store[pageKey].imp[idx],name,content,icon};
    toast('수정되었습니다.');
  } else {
    store[pageKey].imp.push({id:nextId++,icon,name,content});
    toast('추가되었습니다.');
  }
  closeImp();
  const el=document.getElementById('imp-list-'+pageKey);
  if(el) el.innerHTML=renderImpList(pageKey);
}

// ── DELETE ─────────────────────────────────────────────────────────────────
let delTarget=null, delType=null;
function openDel(pageKey,callType,id,label){
  delTarget={pageKey,callType,id}; delType='call';
  document.getElementById('delDesc').textContent=`"${label}" 항목을 삭제하면 되돌릴 수 없습니다.`;
  document.getElementById('delOverlay').classList.add('open');
}
function openDelImp(pageKey,id,label){
  delTarget={pageKey,id}; delType='imp';
  document.getElementById('delDesc').textContent=`"${label}" 항목을 삭제하면 되돌릴 수 없습니다.`;
  document.getElementById('delOverlay').classList.add('open');
}
function closeDel(){document.getElementById('delOverlay').classList.remove('open'); delTarget=null;}
function confirmDel(){
  if(!delTarget) return;
  if(delType==='call'){
    const {pageKey,callType,id}=delTarget;
    store[pageKey][callType]=store[pageKey][callType].filter(d=>d.id!==id);
    closeDel(); renderPage(currentPage);
  } else {
    const {pageKey,id}=delTarget;
    store[pageKey].imp=store[pageKey].imp.filter(d=>d.id!==id);
    closeDel();
    const el=document.getElementById('imp-list-'+pageKey);
    if(el) el.innerHTML=renderImpList(pageKey);
  }
  toast('삭제되었습니다.');
}

// Close overlays on backdrop click
['editOverlay','impOverlay','delOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target===e.currentTarget){
      if(id==='editOverlay') closeEdit();
      else if(id==='impOverlay') closeImp();
      else closeDel();
    }
  });
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderPage('pg-pkg-sum');
</script>
</body>
</html>
